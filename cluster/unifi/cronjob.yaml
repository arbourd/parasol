apiVersion: batch/v1
kind: CronJob
metadata:
  name: aqara-reconnect
  namespace: unifi
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 60
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          containers:
            - name: kick
              image: curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
              command: ["/bin/sh", "-c"]
              args:
                - |
                  curl -s --max-time 5 -X POST \
                    -H "X-API-Key: $UNIFI_API_KEY" \
                    -H "Content-Type: application/json" \
                    -d '{"cmd": "kick-sta", "mac": "54:ef:44:a5:4f:5d"}' \
                    https://10.128.0.1/proxy/network/api/s/default/cmd/stamgr
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                readOnlyRootFilesystem: true
                runAsNonRoot: true
              env:
                - name: UNIFI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: unifi-gateway
                      key: UNIFI_API_KEY
