apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./cluster/cert-manager/config
  prune: true
  dependsOn:
    - name: cert-manager
  sourceRef:
    kind: GitRepository
    name: cluster
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster
      - kind: Secret
        name: cluster
