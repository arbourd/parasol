apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scrypted
  namespace: scrypted
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  values:
    controllers:
      scrypted:
        pod:
          hostNetwork: true
        containers:
          app:
            image:
              repository: ghcr.io/koush/scrypted
              tag: v0.144.1-noble-intel
            securityContext:
              privileged: true
    service:
      app:
        controller: scrypted
        ports:
          https:
            port: 10443
          http:
            port: 11080
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: local-path
        globalMounts:
          - path: /server/volume
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
