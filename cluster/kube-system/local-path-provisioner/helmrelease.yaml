apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: kube-system
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: local-path-provisioner
    namespace: flux-system
  values:
    nodePathMap:
      - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
        paths:
          - /var/lib/storage
    storageClass:
      defaultClass: true
      name: local-path
    helperPod:
      securityContext:
        privileged: true
