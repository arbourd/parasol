---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium-bgp
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./cluster/kube-system/cilium-bgp
  prune: false
  dependsOn:
    - name: cluster
  sourceRef:
    kind: GitRepository
    name: cluster
  decryption:
    provider: sops
    secretRef:
      name: sops-age
